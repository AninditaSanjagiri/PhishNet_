services:
  - type: web
    name: phishnet-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium
      playwright install-deps chromium
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --loop asyncio
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./phishnet.db
      - key: ALLOWED_ORIGINS
        value: https://your-app.vercel.app
    healthCheckPath: /health
    autoDeploy: true
